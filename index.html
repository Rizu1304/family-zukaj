}

const Bk=({onClick})=>h`<button onClick=${onClick} style=${{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",fontSize:15,fontWeight:700,color:"#d97706",cursor:"pointer",padding:"12px 0",marginBottom:4}}>‚Äπ Zur√ºck</button>`;

function Sh({onClose,children}){return h`<div style=${{position:"fixed",inset:0,background:"rgba(0,0,0,.25)",backdropFilter:"blur(4px)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200}} onClick=${onClose}><div style=${{background:"#fff",borderRadius:"24px 24px 0 0",width:"100%",maxWidth:480,padding:"8px 22px 40px",maxHeight:"90vh",overflowY:"auto",animation:"slideUp .35s cubic-bezier(.22,1,.36,1) both"}} onClick=${e=>e.stopPropagation()}><div style=${{width:36,height:4,borderRadius:4,background:"#e7e5e4",margin:"8px auto 18px"}}/>${children}</div></div>`;}

// ‚îÄ‚îÄ‚îÄ MAIN APP ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function App(){
  const[D,sD]=useState({transactions:[],fixcosts:[],tasks:[],shopping:[],dates:[],notifications:[]});
  const[P,sP]=useState({Rinor:{photo:null},Renan:{photo:null}});
  const[pg,sPg]=useState("home");
  const[mo,sMo]=useState(curMK);
  const[ml,sMl]=useState(null);
  const[ld,sLd]=useState(true);
  const[us,sUs]=useState(localStorage.getItem("fz-user")||"");
  const[ts,sTs]=useState(null);

  useEffect(()=>{
    const u1=onSnapshot(dataRef,s=>{if(s.exists())sD(s.data());sLd(false);},()=>sLd(false));
    const u2=onSnapshot(profRef,s=>{if(s.exists())sP(s.data());});
    return()=>{u1();u2();};
  },[]);

  const sv=useCallback(d=>{sD(d);dbSet(dataRef,d);},[]);
  const svP=useCallback(p=>{sP(p);dbSet(profRef,p);},[]);
  const sUser=n=>{sUs(n);localStorage.setItem("fz-user",n);};
  const ot=us==="Rinor"?"Renan":"Rinor";
  const ntfy=m=>{sTs(m);setTimeout(()=>sTs(null),3e3);};
  const addN=(d,t)=>{const n={id:Date.now().toString(),text:t,from:us,time:new Date().toISOString(),read:false};return{...d,notifications:[n,...(d.notifications||[])].slice(0,30)};};

  const upPh=name=>{const i=document.createElement("input");i.type="file";i.accept="image/*";i.onchange=async e=>{const f=e.target.files?.[0];if(!f)return;const b=await new Promise((r,j)=>{const x=new FileReader();x.onload=()=>r(x.result);x.onerror=j;x.readAsDataURL(f);});const img=new Image();img.onload=()=>{const cv=document.createElement("canvas"),s=120;cv.width=s;cv.height=s;cv.getContext("2d").drawImage(img,(img.width-Math.min(img.width,img.height))/2,(img.height-Math.min(img.width,img.height))/2,Math.min(img.width,img.height),Math.min(img.width,img.height),0,0,s,s);svP({...P,[name]:{photo:cv.toDataURL("image/jpeg",.8)}});};img.src=b;};i.click();};

  // Derived
  const tx=D.transactions||[],mT=tx.filter(t=>mk(t.date)===mo);
  const tI=mT.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const tE=mT.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const tF=(D.fixcosts||[]).reduce((s,f)=>s+f.amount,0);
  const bal=tI-tE-tF;
  const oT=(D.tasks||[]).filter(t=>!t.done);
  const myT=oT.filter(t=>t.assignee===us);
  const od=oT.filter(t=>t.deadline&&new Date(t.deadline)<today);
  const aL=(D.shopping||[]).find(l=>!l.archived)||null;
  const uc=aL?.items?.filter(i=>!i.checked).length||0;
  const up=(D.dates||[]).filter(d=>new Date(d.date)>=today).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const unr=(D.notifications||[]).filter(n=>!n.read&&n.from!==us);
  const avM=[...new Set([curMK,...tx.map(t=>mk(t.date))])].sort().reverse();

  const doneT=id=>{const t=(D.tasks||[]).find(x=>x.id===id);if(!t)return;let u={...D,tasks:D.tasks.map(x=>x.id===id?{...x,done:true,doneAt:new Date().toISOString(),doneBy:us}:x)};u=addN(u,`${us} hat "${t.title}" erledigt ‚úì`);sv(u);ntfy("Aufgabe erledigt!");};

  if(ld)return h`<div style=${{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}><div style=${{width:32,height:32,borderRadius:"50%",border:"3px solid #fde68a",borderTopColor:"#f59e0b",animation:"spin 1s linear infinite"}}/></div>`;

  // SETUP
  if(!us)return h`<div style=${{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:32}}>
    <svg width="64" height="64" viewBox="0 0 48 48"><rect width="48" height="48" rx="14" fill="url(#g1)"/><defs><linearGradient id="g1" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#f59e0b"/><stop offset="1" stop-color="#f97316"/></linearGradient></defs><text x="24" y="30" text-anchor="middle" fill="#fff" font-family="Georgia,serif" font-size="18" font-weight="bold">fz</text></svg>
    <h1 style=${{fontFamily:"'Outfit'",fontSize:28,fontWeight:800,marginTop:16,letterSpacing:"-.03em"}}>Family Zukaj</h1>
    <p style=${{fontSize:14,color:"#78716c",marginTop:4}}>Finanzen ¬∑ Aufgaben ¬∑ Einkauf ¬∑ Wir-Zeit</p>
    <div style=${{width:40,height:3,borderRadius:3,background:"linear-gradient(90deg,#f59e0b,#f97316)",margin:"28px 0"}}/>
    <p style=${{fontSize:15,color:"#57534e",marginBottom:12,fontWeight:600}}>Wer bist du?</p>
    ${["Rinor","Renan"].map(n=>h`<button key=${n} onClick=${()=>sUser(n)} style=${{width:"100%",maxWidth:280,padding:"18px 0",borderRadius:18,border:"1.5px solid #e7e5e4",background:"#fff",fontSize:17,fontWeight:700,cursor:"pointer",marginTop:10,fontFamily:"'Outfit'",display:"flex",alignItems:"center",justifyContent:"center",gap:14,boxShadow:"0 2px 8px rgba(0,0,0,.04)"}}><${Av} photo=${P[n]?.photo} name=${n} size=${42}/>${n}</button>`)}
    <div style=${{width:40,height:3,borderRadius:3,background:"#f5f5f4",margin:"24px 0"}}/>
    <p style=${{fontSize:13,color:"#a8a29e",marginBottom:12}}>Profilbilder hinzuf√ºgen</p>
    <div style=${{display:"flex",gap:24}}>
      ${["Rinor","Renan"].map(n=>h`<div key=${n} style=${{textAlign:"center",cursor:"pointer"}} onClick=${()=>upPh(n)}><${Av} photo=${P[n]?.photo} name=${n} size=${60}/><p style=${{fontSize:12,color:"#78716c",marginTop:8,fontWeight:600}}>${P[n]?.photo?"√Ñndern":"Foto +"}</p></div>`)}
    </div>
    <p style=${{fontSize:12,color:"#a8a29e",marginTop:32,textAlign:"center",lineHeight:1.7}}>Beide √∂ffnen die App auf ihrem Handy.<br/>Alles synchronisiert in Echtzeit.</p>
  </div>`;

  // TILE STYLES
  const ts0={display:"flex",flexDirection:"column",alignItems:"flex-start",gap:6,padding:"20px 18px",borderRadius:20,cursor:"pointer",textAlign:"left",minHeight:110};
  const tn={fontFamily:"'Outfit'",fontSize:16,fontWeight:800,color:"#1c1917"};
  const tsu={fontSize:12,fontWeight:600};
  const ma={width:40,height:40,borderRadius:12,background:"#fff",border:"1.5px solid #e7e5e4",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,color:"#78716c",cursor:"pointer"};
  const ab={flex:1,padding:"14px 0",borderRadius:14,border:"none",background:"linear-gradient(135deg,#f59e0b,#f97316)",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 14px rgba(245,158,11,.2)"};
  const db2={background:"#f0fdf4",border:"1.5px solid #bbf7d0",borderRadius:10,padding:"8px 16px",fontSize:13,fontWeight:700,color:"#059669",cursor:"pointer",whiteSpace:"nowrap"};
  const xb={background:"none",border:"none",color:"#d6d3d1",fontSize:14,cursor:"pointer",padding:6};

  return h`<div>
    ${ts&&h`<div style=${{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"#059669",color:"#fff",padding:"12px 24px",borderRadius:14,fontSize:14,fontWeight:700,zIndex:300,boxShadow:"0 8px 24px rgba(0,0,0,.15)",animation:"fadeUp .3s ease both"}}>${ts}</div>`}

    ${pg==="home"&&h`<div style=${{padding:"20px 16px 40px"}}>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
        <div style=${{display:"flex",alignItems:"center",gap:12}}>
          <div style=${{cursor:"pointer"}} onClick=${()=>upPh(us)}><${Av} photo=${P[us]?.photo} name=${us} size=${44}/></div>
          <div><h1 style=${{fontFamily:"'Outfit'",fontSize:20,fontWeight:800,letterSpacing:"-.02em"}}>Family Zukaj</h1><p style=${{fontSize:12,color:"#a8a29e",fontWeight:600}}>Hallo ${us}</p></div>
        </div>
        ${unr.length>0&&h`<div style=${{position:"relative",cursor:"pointer"}} onClick=${()=>sPg("notifs")}><span style=${{fontSize:22}}>üîî</span><span style=${{position:"absolute",top:-4,right:-6,width:18,height:18,borderRadius:9,background:"#dc2626",color:"#fff",fontSize:10,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>${unr.length}</span></div>`}
      </div>
      <${Cd}><div style=${{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}><div><p style=${{fontSize:11,fontWeight:700,color:"#a8a29e",textTransform:"uppercase",letterSpacing:".08em"}}>${MO[parseInt(mo.split("-")[1])-1]} ¬∑ Noch ${dLeft} Tage</p><p style=${{fontFamily:"'Outfit'",fontSize:28,fontWeight:800,color:bal>=0?"#059669":"#dc2626",marginTop:4}}>${fmt(bal)}</p></div><span style=${{fontSize:12,fontWeight:700,color:"#a8a29e"}}>verf√ºgbar</span></div><//>
      <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:8}}>

    <${Lb}>Uhrzeit<//><${Ip} type="time" value=${tm} onChange=${e=>sTm(e.target.value)}/>
    <${Lb}>Notizen<//><${Ip} type="text" value=${nt} onChange=${e=>sNt(e.target.value)} placeholder="z.B. Reservation 19:00"/>
    <${Bb} onClick=${()=>{if(!tl.trim()||!dt)return;onSave({id:Date.now().toString(),title:tl.trim(),type:tp,date:dt,time:tm,notes:nt,createdBy:user});}} disabled=${!tl.trim()||!dt}>Eintragen<//>`;
}

ReactDOM.render(h`<${App}/>`,document.getElementById("app"));
</script>
</body>
</html>
